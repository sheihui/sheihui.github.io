<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>魏瑶扁担桩 · 训练报时</title>
    <style>
        :root {
            --gold: #f5c862;
            --green: #4cd964;
            --orange: #ff9500;
            --red: #ff3b30;
            --bg: #0f1a2e;
            --card: #1a2845;
            --card2: #213158;
            --border: rgba(245,200,98,0.18);
            --text: #e8eaf0;
            --muted: #8899aa;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "微软雅黑", sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;
            background-image:
                radial-gradient(ellipse at 20% 0%, rgba(245,200,98,0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 100%, rgba(76,217,100,0.04) 0%, transparent 60%);
        }

        /* ===== 顶部横幅 ===== */
        .top-banner {
            width: 100%;
            background: linear-gradient(135deg, #1a2845 0%, #0f1a2e 100%);
            border-bottom: 1px solid var(--border);
            padding: clamp(5px, 1.2vh, 12px) 24px clamp(4px, 0.8vh, 8px);
            text-align: center;
            flex-shrink: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        .app-title {
            font-size: clamp(14px, 2.5vw, 20px);
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(245,200,98,0.4);
        }
        .app-subtitle {
            font-size: clamp(10px, 1.5vw, 12px);
            color: var(--muted);
            margin-top: 2px;
            letter-spacing: 1px;
        }

        /* ===== 主容器 ===== */
        .main-wrap {
            width: 100%;
            max-width: 900px;
            padding: clamp(2px, 0.4vh, 8px) clamp(12px, 3vw, 32px) clamp(2px, 0.4vh, 8px);
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }

        /* ===== 总进度环 ===== */
        .ring-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0;
            margin-bottom: clamp(2px, 0.4vh, 8px);
        }

        .ring-container {
            position: relative;
            width: clamp(90px, 14vh, 130px);
            height: clamp(90px, 14vh, 130px);
            margin: 0 auto;
        }

        .ring-svg {
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
        }

        .ring-bg {
            fill: none;
            stroke: rgba(255,255,255,0.06);
            stroke-width: 12;
        }

        .ring-progress {
            fill: none;
            stroke: var(--gold);
            stroke-width: 12;
            stroke-linecap: round;
            stroke-dasharray: 565.48;
            stroke-dashoffset: 565.48;
            transition: stroke-dashoffset 1s linear;
            filter: drop-shadow(0 0 8px rgba(245,200,98,0.6));
        }

        .ring-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .ring-time {
            font-size: clamp(22px, 4vh, 34px);
            font-weight: 800;
            color: #fff;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            letter-spacing: -1px;
        }

        .ring-label {
            font-size: clamp(10px, 1.5vh, 13px);
            color: var(--muted);
            margin-top: 3px;
        }

        .ring-total {
            font-size: clamp(10px, 1.5vh, 13px);
            color: var(--gold);
            margin-top: 1px;
            font-weight: 600;
        }

        /* ===== 当前步骤卡片 ===== */
        .step-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: clamp(6px, 1vh, 12px) clamp(10px, 1.5vw, 16px) clamp(6px, 0.8vh, 10px);
            margin-bottom: clamp(3px, 0.5vh, 8px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        .step-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--gold), transparent);
            border-radius: 20px 20px 0 0;
        }

        .step-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(245,200,98,0.12);
            border: 1px solid rgba(245,200,98,0.3);
            border-radius: 16px;
            padding: 2px 8px;
            font-size: clamp(9px, 1.2vh, 11px);
            color: var(--gold);
            font-weight: 600;
            margin-bottom: clamp(2px, 0.4vh, 6px);
        }

        .step-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--gold);
            animation: pulse-dot 1.5s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.7); }
        }

        .step-name {
            font-size: clamp(12px, 1.8vh, 16px);
            font-weight: 700;
            color: #fff;
            margin-bottom: clamp(4px, 0.6vh, 8px);
            line-height: 1.3;
        }

        .step-countdown {
            display: flex;
            align-items: baseline;
            gap: 4px;
            margin-bottom: clamp(3px, 0.5vh, 8px);
        }

        .countdown-num {
            font-size: clamp(20px, 3.2vh, 30px);
            font-weight: 800;
            color: var(--green);
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }

        .countdown-unit {
            font-size: clamp(12px, 1.5vh, 14px);
            color: var(--muted);
        }

        .step-progress-wrap {
            margin-bottom: clamp(3px, 0.5vh, 6px);
        }

        .step-progress-bg {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.08);
            border-radius: 3px;
            overflow: hidden;
        }

        .step-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--green), rgba(76,217,100,0.6));
            border-radius: 3px;
            width: 0%;
            transition: width 1s linear;
        }

        .step-tip {
            font-size: clamp(10px, 1.2vh, 12px);
            color: var(--muted);
            line-height: 1.45;
            padding: clamp(4px, 0.6vh, 8px) 10px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            border-left: 3px solid rgba(245,200,98,0.4);
        }

        /* ===== 总进度条 ===== */
        .total-progress-section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: clamp(5px, 0.7vh, 10px) clamp(10px, 1.5vw, 16px);
            margin-bottom: clamp(3px, 0.5vh, 8px);
            flex-shrink: 0;
        }

        .total-progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: clamp(3px, 0.5vh, 6px);
        }

        .total-progress-label {
            font-size: clamp(11px, 1.4vh, 13px);
            color: var(--muted);
        }

        .total-progress-pct {
            font-size: clamp(12px, 1.6vh, 15px);
            font-weight: 700;
            color: var(--gold);
        }

        .total-progress-bg {
            width: 100%;
            height: 10px;
            background: rgba(255,255,255,0.06);
            border-radius: 5px;
            overflow: hidden;
        }

        .total-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--gold), #ffdb80);
            border-radius: 5px;
            width: 0%;
            transition: width 1s linear;
            box-shadow: 0 0 10px rgba(245,200,98,0.4);
        }

        /* ===== 步骤列表（2列×3行网格，自适应高度） ===== */
        .steps-list {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: clamp(4px, 0.7vh, 10px) clamp(8px, 1.2vw, 14px);
            margin-bottom: clamp(3px, 0.5vh, 8px);
            flex: 0 0 auto;
        }

        .steps-list-title {
            font-size: clamp(10px, 1.2vh, 12px);
            color: var(--muted);
            margin-bottom: clamp(3px, 0.5vh, 6px);
            font-weight: 600;
            letter-spacing: 1px;
        }

        .steps-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
        }

        .step-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: clamp(4px, 0.6vh, 8px) clamp(6px, 0.8vw, 10px);
            border-radius: 10px;
            border: 1px solid transparent;
            background: rgba(255,255,255,0.03);
            transition: all 0.35s ease;
            cursor: default;
        }

        .step-item.active {
            background: rgba(245,200,98,0.15);
            border: 1px solid rgba(245,200,98,0.5);
            box-shadow: 0 0 20px rgba(245,200,98,0.2), inset 0 0 20px rgba(245,200,98,0.05);
            transform: scale(1.03);
            z-index: 2;
            position: relative;
        }

        .step-item.active::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 14px;
            border: 2px solid var(--gold);
            animation: highlight-pulse 1s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes highlight-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .step-item.done {
            opacity: 0.35;
            background: rgba(76,217,100,0.05);
            border: 1px solid rgba(76,217,100,0.15);
        }

        .step-item-num {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: var(--muted);
            font-weight: 700;
            flex-shrink: 0;
            transition: all 0.35s;
        }

        .step-item.active .step-item-num {
            background: var(--gold);
            color: #000;
            box-shadow: 0 0 12px rgba(245,200,98,0.6);
        }

        .step-item.done .step-item-num {
            background: rgba(76,217,100,0.4);
            color: var(--green);
        }

        .step-item-info {
            flex: 1;
            min-width: 0;
        }

        .step-item-name {
            font-size: clamp(9px, 1.1vh, 12px);
            color: var(--text);
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .step-item.active .step-item-name {
            color: #fff;
            font-weight: 700;
        }

        .step-item.done .step-item-name {
            text-decoration: line-through;
        }

        .step-item-dur {
            font-size: clamp(9px, 1.1vh, 11px);
            color: var(--muted);
            margin-top: 2px;
        }

        .step-item.active .step-item-dur {
            color: var(--gold);
        }

        .step-item-check {
            font-size: 16px;
            opacity: 0;
            transition: opacity 0.3s;
            color: var(--green);
            flex-shrink: 0;
        }

        .step-item.done .step-item-check {
            opacity: 1;
        }

        /* ===== 控制按钮 ===== */
        .btn-section {
            display: flex;
            gap: 8px;
            margin-bottom: clamp(3px, 0.5vh, 6px);
            flex-shrink: 0;
        }

        .btn {
            flex: 1;
            padding: clamp(8px, 1.2vh, 14px) 8px;
            border-radius: 10px;
            border: none;
            font-size: clamp(12px, 1.6vh, 15px);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0);
            transition: background 0.15s;
        }

        .btn:active::after {
            background: rgba(255,255,255,0.15);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-start {
            background: linear-gradient(135deg, var(--green), #3ab854);
            color: #fff;
            box-shadow: 0 4px 20px rgba(76,217,100,0.35);
        }

        .btn-pause {
            background: linear-gradient(135deg, var(--orange), #e08000);
            color: #fff;
            box-shadow: 0 4px 20px rgba(255,149,0,0.35);
        }

        .btn-reset {
            background: linear-gradient(135deg, #384a6a, #263248);
            color: var(--muted);
            border: 1px solid var(--border);
            flex: 0.6;
        }

        /* ===== 背景音乐提示 ===== */
        .music-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: clamp(3px, 0.5vh, 7px) clamp(8px, 1vw, 12px);
            background: rgba(76,217,100,0.08);
            border: 1px solid rgba(76,217,100,0.2);
            border-radius: 10px;
            margin-bottom: clamp(3px, 0.5vh, 6px);
            flex-shrink: 0;
            font-size: clamp(10px, 1.2vh, 12px);
            color: var(--green);
        }

        /* ===== 语音提示 + 版权 ===== */
        .voice-tip {
            text-align: center;
            font-size: clamp(9px, 1.1vh, 11px);
            color: var(--muted);
            padding: clamp(3px, 0.5vh, 7px);
            background: rgba(255,255,255,0.02);
            border-radius: 8px;
            flex-shrink: 0;
            margin-bottom: clamp(2px, 0.3vh, 5px);
        }

        .copyright {
            text-align: center;
            font-size: clamp(9px, 1.1vh, 12px);
            color: rgba(136,153,170,0.5);
            padding: clamp(2px, 0.3vh, 5px);
            flex-shrink: 0;
            letter-spacing: 0.5px;
            line-height: 1.3;
        }

        /* ===== 信息栏（介绍按钮 + 训练次数） ===== */
        .info-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            flex-shrink: 0;
            margin-bottom: clamp(3px, 0.5vh, 6px);
        }

        .intro-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 12px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: rgba(245,200,98,0.08);
            color: var(--gold);
            font-size: clamp(10px, 1.2vh, 12px);
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .intro-btn:hover {
            background: rgba(245,200,98,0.18);
        }

        .history-count {
            font-size: clamp(10px, 1.2vh, 12px);
            color: var(--muted);
            white-space: nowrap;
        }

        .history-count strong {
            color: var(--gold);
            font-weight: 700;
        }

        /* ===== 完成弹层 ===== */
        .finish-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(6px);
        }

        .finish-overlay.show {
            display: flex;
        }

        .finish-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px 32px;
            text-align: center;
            max-width: 320px;
            width: 90%;
            animation: scale-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes scale-in {
            from { transform: scale(0.6); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .finish-emoji {
            font-size: 60px;
            margin-bottom: 16px;
        }

        .finish-title {
            font-size: 22px;
            font-weight: 800;
            color: var(--gold);
            margin-bottom: 8px;
        }

        .finish-desc {
            font-size: 14px;
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .finish-btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--gold), #e0a830);
            color: #000;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        /* ===== 语音播报闪烁 ===== */
        .voice-flash {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(245,200,98,0.95);
            color: #000;
            font-size: 20px;
            font-weight: 800;
            padding: 16px 36px;
            border-radius: 50px;
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            letter-spacing: 2px;
        }

        .voice-flash.show {
            opacity: 1;
        }

        /* ===== 等待状态 ===== */
        .idle-hint {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: clamp(6px, 1vh, 12px);
            color: var(--muted);
            font-size: clamp(11px, 1.4vh, 13px);
        }

        .idle-icon {
            font-size: clamp(28px, 4vh, 40px);
            animation: float 2s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        /* ===== 状态指示器 ===== */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: clamp(3px, 0.5vh, 6px) 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            margin-bottom: clamp(3px, 0.5vh, 8px);
            font-size: clamp(10px, 1.2vh, 12px);
            color: var(--muted);
            flex-shrink: 0;
        }

        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--muted);
            transition: background 0.3s;
        }

        .status-dot.running {
            background: var(--green);
            animation: blink 1s ease-in-out infinite;
        }

        .status-dot.paused {
            background: var(--orange);
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

    </style>
</head>
<body>

<!-- 顶部横幅 -->
<div class="top-banner">
    <div class="app-title">🥢 魏瑶扁担桩</div>
    <div class="app-subtitle">标准训练报时 · 180秒专属闭环</div>
</div>

<!-- 主容器 -->
<div class="main-wrap">

    <!-- 总进度环 -->
    <div class="ring-section">
        <div class="ring-container">
            <svg class="ring-svg" viewBox="0 0 200 200">
                <circle class="ring-bg" cx="100" cy="100" r="90"/>
                <circle class="ring-progress" id="ringProgress" cx="100" cy="100" r="90"/>
            </svg>
            <div class="ring-center">
                <div class="ring-time" id="totalTime">3:00</div>
                <div class="ring-label">总剩余时间</div>
                <div class="ring-total" id="ringPercent">0%</div>
            </div>
        </div>
    </div>

    <!-- 状态栏 -->
    <div class="status-bar">
        <div style="display:flex;align-items:center;gap:8px;">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">等待开始训练</span>
        </div>
        <span class="history-count" id="historyCount">🏆 累计训练 <strong>0</strong> 次</span>
    </div>

    <!-- 信息栏（介绍按钮） -->
    <div class="info-bar">
        <button class="intro-btn" onclick="speakIntro()">📖 关于魏瑶扁担桩</button>
    </div>

    <!-- 当前步骤卡片 -->
    <div class="step-card" id="stepCard">
        <div class="idle-hint" id="idleHint">
            <div class="idle-icon">🎯</div>
            <div>点击「开始训练」进入标准训练模式</div>
            <div style="font-size:12px;">全程 180 秒 · 语音精准报时 · 可导入背景音乐伴练</div>
        </div>
        <div id="activeStepContent" style="display:none;">
            <div class="step-badge">
                <div class="step-dot"></div>
                <span id="stepBadge">第 1 步 / 共 6 步</span>
            </div>
            <div class="step-name" id="stepName">—</div>
            <div class="step-countdown">
                <div class="countdown-num" id="stepCountdown">—</div>
                <div class="countdown-unit">秒</div>
            </div>
            <div class="step-progress-wrap">
                <div class="step-progress-bg">
                    <div class="step-progress-bar" id="stepProgressBar"></div>
                </div>
            </div>
            <div class="step-tip" id="stepTip"></div>
        </div>
    </div>

    <!-- 总进度条 -->
    <div class="total-progress-section">
        <div class="total-progress-header">
            <span class="total-progress-label">整体训练进度</span>
            <span class="total-progress-pct" id="totalPct">0%</span>
        </div>
        <div class="total-progress-bg">
            <div class="total-progress-bar" id="totalProgressBar"></div>
        </div>
    </div>

    <!-- 步骤列表（2列×3行网格） -->
    <div class="steps-list">
        <div class="steps-list-title">📋 训练流程</div>
        <div class="steps-grid" id="stepListContainer"></div>
    </div>

    <!-- 背景音乐状态 -->
    <div class="music-indicator" id="musicIndicator">🎵 渔舟唱晚（古筝版）</div>

    <!-- 控制按钮 -->
    <div class="btn-section">
        <button class="btn btn-start" id="btnStart" onclick="handleStart()">▶ 开始训练</button>
        <button class="btn btn-pause" id="btnPause" onclick="handlePause()" style="display:none;">⏸ 暂停</button>
        <button class="btn btn-reset" id="btnReset" onclick="handleReset()">↺ 重置</button>
    </div>

    <!-- 语音提示 -->
    <div class="voice-tip" id="voiceTip">
        🔊 首次点击开始后，浏览器将请求语音权限，请允许以启用自动报时
    </div>

    <!-- 版权标识 -->
    <div class="copyright">
        湖南翼扬文化传媒有限公司 · 湖南翼扬体育科技有限公司 · 湖南魏瑶旅游有限公司 联合开发
    </div>

</div>

<!-- 完成弹层 -->
<div class="finish-overlay" id="finishOverlay">
    <div class="finish-card">
        <div class="finish-emoji">🎉</div>
        <div class="finish-title">训练完成！</div>
        <div class="finish-desc">
            恭喜完成 180 秒魏瑶扁担桩标准训练<br>
            坚持练习，体态端正、体能提升！
        </div>
        <button class="finish-btn" onclick="handleReset()">再练一次</button>
    </div>
</div>

<!-- 语音播报闪烁提示 -->
<div class="voice-flash" id="voiceFlash"></div>

<script>
// ===== 训练步骤配置（精确匹配180秒） =====
// speakInterval: 每步的报时间隔（秒）
const stepList = [
    {
        name: "起式下蹲 · 水平持桩",
        duration: "60秒",
        time: 60,
        speakInterval: 10,   // 每10秒报时
        tip: "上身中正，跨步与肩同宽，匀速下蹲，膝角100°~120°，扁担保持水平，核心稳定不松懈"
    },
    {
        name: "竖直举桩 · 定型",
        duration: "27秒",
        time: 27,
        speakInterval: 9,    // 每9秒报时（第9、18、27秒）
        tip: "保持桩立如树，手腕放松不超伸，脊柱拉伸感明显，双肩自然外展，呼吸平稳均匀"
    },
    {
        name: "站立调整",
        duration: "3秒",
        time: 3,
        speakInterval: 1,    // 每1秒报时（3、2、1）
        tip: "缓慢站起，膝关节伸直，身体放松调整，为下一动作过渡做准备"
    },
    {
        name: "回落水平持桩",
        duration: "27秒",
        time: 27,
        speakInterval: 9,    // 每9秒报时
        tip: "控制节奏放低扁担至水平位置，肩肘腕保持稳定，避免晃动，感受肌肉离心收缩"
    },
    {
        name: "静力持桩 · 稳态支撑",
        duration: "60秒",
        time: 60,
        speakInterval: 10,   // 每10秒报时
        tip: "全程静力保持，专注呼吸节律，感受肩背核心持续发力，坚守姿势不崩架"
    },
    {
        name: "收势归位",
        duration: "3秒",
        time: 3,
        speakInterval: 1,    // 每1秒报时
        tip: "缓慢放下扁担，深呼一口气，全身放松，感受训练后身体的平衡与舒适"
    }
];

const TOTAL_TIME = 180;

// ===== 魏瑶扁担桩介绍文本 =====
const INTRO_TEXT = `魏瑶扁担桩，源自中国传统武术与养生功法，是一种以扁担为器械的站桩训练方法。训练者双脚与肩同宽，微屈膝下蹲，双手持扁担保持水平或变换角度，通过静态支撑与动态转换，锻炼全身肌群的协调性与耐力。此功法强调"桩稳如山、气沉丹田"，在180秒的标准训练中，依次完成水平持桩、竖直举桩、站立调整、回落持桩、静力支撑与收势归位六个动作，实现力量、平衡与呼吸的完整闭环。长期练习可改善体态、增强核心力量、提升专注力，适合各年龄段人群日常锻炼。`;

// ===== 训练历史次数 =====
const STORAGE_KEY = 'wydbz_train_count';

function getTrainCount() {
    const v = localStorage.getItem(STORAGE_KEY);
    return v ? parseInt(v) : 0;
}

function incTrainCount() {
    const count = getTrainCount() + 1;
    localStorage.setItem(STORAGE_KEY, count);
    updateHistoryUI(count);
    return count;
}

function updateHistoryUI(count) {
    document.getElementById('historyCount').innerHTML = `🏆 累计训练 <strong>${count}</strong> 次`;
}

function speakIntro() {
    if (!window.speechSynthesis) return;
    // 先停掉当前播报，避免和训练报时冲突
    if (isRunning || isPaused) {
        alert('训练进行中，请先暂停后再查看介绍');
        return;
    }
    window.speechSynthesis.cancel();
    speakQueue = [];
    isSpeaking = false;
    pendingStepEnd = false;
    const utter = new SpeechSynthesisUtterance(INTRO_TEXT);
    utter.lang = 'zh-CN';
    utter.rate = 1.0;
    utter.pitch = 1.05;
    utter.volume = 1.0;
    window.speechSynthesis.speak(utter);
    showVoiceFlash('📖 魏瑶扁担桩介绍播报中…');
    utter.onend = () => {
        document.getElementById('voiceFlash').classList.remove('show');
    };
    utter.onerror = () => {
        document.getElementById('voiceFlash').classList.remove('show');
    };
}

// ===== 状态变量 =====
let timer = null;
let currentStepIndex = 0;
let stepTimeLeft = stepList[0].time;
let totalTimeLeft = TOTAL_TIME;
let isRunning = false;
let isPaused = false;
let totalElapsed = 0;
// 每步内部已过去的秒数（用于计算步骤内报时）
let stepElapsed = 0;

// 圆环周长：r=90 => 2*PI*90 = 565.48
const RING_CIRCUMFERENCE = 2 * Math.PI * 90;

// ===== 背景音乐（页面打开自动播放渔舟唱晚） =====
const MUSIC_PATH = '渔舟唱晚 - 中央民族乐团.mp3';

let bgMusic = null;
let musicReady = false;

function getBgMusic() {
    if (!bgMusic) {
        bgMusic = new Audio(MUSIC_PATH);
        bgMusic.loop = true;
        bgMusic.volume = 0.6;
        bgMusic.addEventListener('canplaythrough', () => {
            musicReady = true;
            document.getElementById('musicIndicator').textContent = '🎵 渔舟唱晚（古筝版）· 播放中';
        });
        bgMusic.addEventListener('play', () => {
            document.getElementById('musicIndicator').textContent = '🎵 渔舟唱晚（古筝版）· 播放中';
        });
        bgMusic.addEventListener('pause', () => {
            document.getElementById('musicIndicator').textContent = '🎵 渔舟唱晚（古筝版）· 已暂停';
        });
    }
    return bgMusic;
}

// 尝试自动播放（可能被浏览器拦截）
function tryAutoPlay() {
    const audio = getBgMusic();
    audio.play().then(() => {
        musicReady = true;
    }).catch(() => {
        document.getElementById('musicIndicator').textContent = '🎵 渔舟唱晚（古筝版）· 点击页面开始播放';
    });
}

// 页面加载时预加载并尝试播放
function initBgMusic() {
    const audio = getBgMusic();
    audio.load();
    tryAutoPlay();
}

// 用户首次点击页面时重试播放（绕过浏览器自动播放限制）
document.addEventListener('click', function resumeMusicOnInteraction() {
    const audio = getBgMusic();
    if (audio.paused) {
        audio.play().catch(() => {});
    }
}, { once: false });

// ===== 初始化步骤列表 =====
function initStepList() {
    const container = document.getElementById('stepListContainer');
    container.innerHTML = '';
    stepList.forEach((step, i) => {
        const el = document.createElement('div');
        el.className = 'step-item';
        el.id = 'stepItem_' + i;
        // 报时说明
        let timingHint = '';
        if (step.speakInterval === 1) timingHint = '逐秒报';
        else if (step.speakInterval === 9) timingHint = '每9秒报';
        else timingHint = '每10秒报';

        el.innerHTML = `
            <div class="step-item-num" id="stepNum_${i}">${i+1}</div>
            <div class="step-item-info">
                <div class="step-item-name">${step.name}</div>
                <div class="step-item-dur">${step.duration} · ${timingHint}</div>
            </div>
            <div class="step-item-check">✓</div>
        `;
        container.appendChild(el);
    });
}

// ===== 更新步骤列表状态 =====
function updateStepListUI() {
    stepList.forEach((_, i) => {
        const el = document.getElementById('stepItem_' + i);
        el.classList.remove('active', 'done');
        if (i < currentStepIndex) el.classList.add('done');
        else if (i === currentStepIndex && (isRunning || isPaused)) el.classList.add('active');
    });
}

// ===== 格式化时间 =====
function formatTime(sec) {
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return m + ':' + String(s).padStart(2, '0');
}

// ===== 更新UI =====
function updateUI() {
    document.getElementById('totalTime').textContent = formatTime(totalTimeLeft);

    const totalPct = Math.round((TOTAL_TIME - totalTimeLeft) / TOTAL_TIME * 100);
    document.getElementById('totalPct').textContent = totalPct + '%';
    document.getElementById('ringPercent').textContent = totalPct + '%';
    document.getElementById('totalProgressBar').style.width = totalPct + '%';

    const offset = RING_CIRCUMFERENCE * (1 - (TOTAL_TIME - totalTimeLeft) / TOTAL_TIME);
    document.getElementById('ringProgress').style.strokeDashoffset = offset;

    if (isRunning || isPaused) {
        document.getElementById('idleHint').style.display = 'none';
        document.getElementById('activeStepContent').style.display = 'block';

        const step = stepList[currentStepIndex];
        const stepPct = Math.round(stepElapsed / step.time * 100);

        document.getElementById('stepBadge').textContent = `第 ${currentStepIndex+1} 步 / 共 ${stepList.length} 步`;
        document.getElementById('stepName').textContent = step.name;
        document.getElementById('stepCountdown').textContent = stepTimeLeft;
        document.getElementById('stepTip').textContent = step.tip;
        document.getElementById('stepProgressBar').style.width = stepPct + '%';
    }

    updateStepListUI();
}

// ===== 语音合成 =====
let speakQueue = [];
let isSpeaking = false;
let pendingStepEnd = false;   // 步骤刚刚结束，等待语音播完再过渡

function speak(text) {
    if (!window.speechSynthesis || !text) return;
    speakQueue.push(text);
    if (!isSpeaking) processQueue();
}

function processQueue() {
    if (speakQueue.length === 0) {
        isSpeaking = false;
        // 语音队列清空后，检查是否有待处理的步骤过渡
        if (pendingStepEnd) {
            pendingStepEnd = false;
            doStepTransition();
        }
        return;
    }
    isSpeaking = true;
    const text = speakQueue.shift();
    try {
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'zh-CN';
        utter.rate = 1.0;
        utter.pitch = 1.05;
        utter.volume = 1.0;
        utter.onend = () => { isSpeaking = false; processQueue(); };
        utter.onerror = () => { isSpeaking = false; processQueue(); };
        window.speechSynthesis.speak(utter);
    } catch(e) { isSpeaking = false; processQueue(); }
}

// ===== 显示语音闪烁 =====
function showVoiceFlash(text) {
    const el = document.getElementById('voiceFlash');
    el.textContent = text;
    el.classList.add('show');
    clearTimeout(el._hideTimer);
    el._hideTimer = setTimeout(() => el.classList.remove('show'), 1600);
}

// ===== 计时器核心 =====
function tick() {
    if (!isRunning) return;

    // 先递减
    stepTimeLeft--;
    totalTimeLeft--;
    stepElapsed++;
    totalElapsed++;

    updateUI();

    const step = stepList[currentStepIndex];
    const interval = step.speakInterval;
    const isStepComplete = stepTimeLeft <= 0;

    // 先报当前步骤的报时（优先于步骤切换）
    if (interval === 1 && !isStepComplete) {
        speak(`${stepTimeLeft}`);
        showVoiceFlash(`⏱ ${stepTimeLeft}`);
    } else if (interval > 1 && stepElapsed % interval === 0) {
        speak(`${stepElapsed}秒`);
        showVoiceFlash(`⏱ ${stepElapsed}秒`);
    }

    // 步骤完成：暂停计时，等语音播完再过渡
    if (isStepComplete) {
        isRunning = false;
        clearInterval(timer);
        timer = null;
        pendingStepEnd = true;
        // 如果当前没有语音在播放，直接过渡（避免 interval=1 的步骤卡住）
        if (speakQueue.length === 0 && !isSpeaking) {
            pendingStepEnd = false;
            doStepTransition();
        }
    }
}

// ===== 步骤过渡（语音队列清空后调用） =====
function doStepTransition() {
    currentStepIndex++;
    if (currentStepIndex >= stepList.length) {
        finishTraining();
        return;
    }

    stepTimeLeft = stepList[currentStepIndex].time;
    stepElapsed = 0;
    const newStep = stepList[currentStepIndex];
    const cleanName = newStep.name.replace(/·/g, '').trim();
    speak(`进入${cleanName}`);
    showVoiceFlash(`➡ ${cleanName}`);

    // 3秒步骤：立即播报起始倒计时 "3秒"
    if (newStep.speakInterval === 1) {
        speak(`${stepTimeLeft}秒`);
        showVoiceFlash(`⏱ ${stepTimeLeft}秒`);
    }

    updateUI();

    // 恢复计时
    if (isPaused) {
        updateUI();
    } else {
        isRunning = true;
        timer = setInterval(tick, 1000);
    }
}

// ===== 完成训练 =====
function finishTraining() {
    isRunning = false;
    clearInterval(timer);
    timer = null;

    totalTimeLeft = 0;
    updateUI();

    speak('训练完成，恭喜你！');
    showVoiceFlash('🎉 训练完成！');

    // 累计训练次数
    incTrainCount();

    // 背景音乐停止
    const audio = getBgMusic();
    audio.pause();

    document.getElementById('statusDot').className = 'status-dot';
    document.getElementById('statusText').textContent = '训练已完成 🎉';
    document.getElementById('btnStart').style.display = 'none';
    document.getElementById('btnPause').style.display = 'none';

    setTimeout(() => {
        document.getElementById('finishOverlay').classList.add('show');
    }, 800);
}

// ===== 开始/继续 =====
function handleStart() {
    if (isRunning) return;

    // 解锁语音（需要用户交互）
    speak('');

    isRunning = true;
    isPaused = false;

    document.getElementById('btnStart').style.display = 'none';
    document.getElementById('btnPause').style.display = 'flex';
    document.getElementById('idleHint').style.display = 'none';
    document.getElementById('activeStepContent').style.display = 'block';
    document.getElementById('voiceTip').textContent = '🔊 语音精准报时已启动';

    document.getElementById('statusDot').className = 'status-dot running';
    document.getElementById('statusText').textContent = '训练中…';

    // 开始时播报第一步
    const firstName = stepList[0].name.replace(/·/g, '').trim();
    speak(`开始训练，${firstName}`);
    showVoiceFlash(`▶ ${firstName}`);

    // 确保背景音乐在播放
    const audio = getBgMusic();
    if (audio.paused) {
        audio.play().catch(e => {});
    }

    updateUI();
    timer = setInterval(tick, 1000);
}

// ===== 暂停/继续 =====
function handlePause() {
    if (!isRunning && !isPaused) return;

    if (isRunning) {
        isRunning = false;
        isPaused = true;
        clearInterval(timer);
        timer = null;
        document.getElementById('btnPause').textContent = '▶ 继续';
        document.getElementById('statusDot').className = 'status-dot paused';
        document.getElementById('statusText').textContent = '已暂停';
        speak('训练已暂停');
        // 背景音乐暂停
        const audio = getBgMusic();
        if (!audio.paused) audio.pause();
    } else {
        isRunning = true;
        isPaused = false;
        document.getElementById('btnPause').textContent = '⏸ 暂停';
        document.getElementById('statusDot').className = 'status-dot running';
        document.getElementById('statusText').textContent = '训练中…';
        speak('继续训练');
        // 恢复背景音乐
        const audio = getBgMusic();
        if (audio.paused) audio.play().catch(e => {});
        timer = setInterval(tick, 1000);
    }
}

// ===== 重置 =====
function handleReset() {
    isRunning = false;
    isPaused = false;
    clearInterval(timer);
    timer = null;

    currentStepIndex = 0;
    stepTimeLeft = stepList[0].time;
    stepElapsed = 0;
    totalTimeLeft = TOTAL_TIME;
    totalElapsed = 0;
    speakQueue = [];
    isSpeaking = false;
    pendingStepEnd = false;
    if (window.speechSynthesis) window.speechSynthesis.cancel();

    // 停止背景音乐
    const audio = getBgMusic();
    audio.pause();
    audio.currentTime = 0;

    document.getElementById('finishOverlay').classList.remove('show');
    document.getElementById('btnStart').style.display = 'flex';
    document.getElementById('btnStart').textContent = '▶ 开始训练';
    document.getElementById('btnPause').style.display = 'none';
    document.getElementById('btnPause').textContent = '⏸ 暂停';
    document.getElementById('idleHint').style.display = 'flex';
    document.getElementById('activeStepContent').style.display = 'none';
    document.getElementById('statusDot').className = 'status-dot';
    document.getElementById('statusText').textContent = '等待开始训练';
    document.getElementById('voiceTip').textContent = '🔊 首次点击开始后，请允许语音权限以启用自动报时';

    updateUI();
    initStepList();
}

// ===== 初始化 =====
initStepList();
updateUI();
updateHistoryUI(getTrainCount());
initBgMusic();

// 防止手机息屏（Wake Lock API）
async function requestWakeLock() {
    if ('wakeLock' in navigator) {
        try { await navigator.wakeLock.request('screen'); } catch(e) {}
    }
}

document.getElementById('btnStart').addEventListener('click', () => {
    requestWakeLock();
});

document.addEventListener('visibilitychange', () => {
    if (!document.hidden && isRunning) requestWakeLock();
});

</script>
